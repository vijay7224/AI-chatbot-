!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ChatBot</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
  <div class="logo">ChatBot</div>
  <div style="opacity:0.7; font-size:0.9rem;">Hindi AI Assistant</div>
</header>

<div class="chat-container" id="chatContainer">
  <div class="message bot">
    नमस्ते! मैं आपका AI साथी हूँ 😊<br>
    आज आप किस बारे में बात करना चाहते हैं?
  </div>
</div>

<div class="input-area">
  <input type="text" id="messageInput" placeholder="अपना मैसेज लिखें..." autocomplete="off"/>
  <button id="sendBtn">Send</button>
</div>

<script>
const chatContainer = document.getElementById('chatContainer');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');

sendBtn.addEventListener('click', sendMessage);

messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    sendMessage();
  }
});

function sendMessage() {
  const text = messageInput.value.trim();
  if (!text) return;

  const userMsg = document.createElement('div');
  userMsg.className = 'message user';
  userMsg.textContent = text;
  chatContainer.appendChild(userMsg);

  messageInput.value = '';
  chatContainer.scrollTop = chatContainer.scrollHeight;

  const typing = document.createElement('div');
  typing.className = 'message bot';
  typing.textContent = "Typing...";
  chatContainer.appendChild(typing);

  fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  })
  .then(response => response.json())
  .then(data => {
    chatContainer.removeChild(typing);

    const botMsg = document.createElement('div');
    botMsg.className = 'message bot';
    botMsg.innerHTML = data.reply;
    chatContainer.appendChild(botMsg);

    chatContainer.scrollTop = chatContainer.scrollHeight;
  })
  .catch(error => {
    chatContainer.removeChild(typing);
    console.error("Error:", error);
  });
}
</script>

</body>
</html>
